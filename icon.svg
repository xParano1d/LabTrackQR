<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  
  <!-- Top-Left QR Eye -->
  <rect x="1" y="1" width="12" height="12" fill="none" stroke="white" stroke-width="2" />
  <rect x="4" y="4" width="6" height="6" fill="white" />

  <!-- Top-Right QR Eye -->
  <rect x="19" y="1" width="12" height="12" fill="none" stroke="white" stroke-width="2" />
  <rect x="22" y="4" width="6" height="6" fill="white" />

  <!-- Bottom-Left QR Eye -->
  <rect x="1" y="19" width="12" height="12" fill="none" stroke="white" stroke-width="2" />
  <rect x="4" y="22" width="6" height="6" fill="white" />

  <!-- Dense QR Data Matrix -->
  <!-- Top Gap -->
  <rect x="16" y="0" width="2" height="2" fill="white" />
  <rect x="14" y="2" width="2" height="2" fill="white" />
  <rect x="16" y="6" width="2" height="4" fill="white" />
  <rect x="14" y="10" width="2" height="2" fill="white" />

  <!-- Left Gap -->
  <rect x="0" y="16" width="2" height="2" fill="white" />
  <rect x="2" y="14" width="2" height="2" fill="white" />
  <rect x="6" y="16" width="4" height="2" fill="white" />
  <rect x="12" y="14" width="2" height="2" fill="white" />

  <!-- Main Bottom-Right Data Sector -->
  <rect x="16" y="16" width="4" height="4" fill="white" />
  <rect x="22" y="14" width="2" height="2" fill="white" />
  <rect x="26" y="16" width="4" height="2" fill="white" />
  <rect x="30" y="14" width="2" height="6" fill="white" />

  <rect x="14" y="22" width="2" height="4" fill="white" />
  <rect x="18" y="22" width="4" height="2" fill="white" />
  <rect x="24" y="20" width="2" height="4" fill="white" />
  <rect x="30" y="20" width="2" height="2" fill="white" />

  <rect x="20" y="26" width="4" height="4" fill="white" />
  <rect x="28" y="22" width="4" height="2" fill="white" />
  <rect x="30" y="24" width="2" height="4" fill="white" />
  <rect x="26" y="26" width="2" height="2" fill="white" />

  <!-- Bottom/Right Edges -->
  <rect x="16" y="28" width="2" height="4" fill="white" />
  <rect x="24" y="28" width="2" height="4" fill="white" />
  <rect x="28" y="28" width="4" height="2" fill="white" />
  
  <rect x="20" y="30" width="4" height="2" fill="white" />
  <rect x="28" y="30" width="4" height="2" fill="white" />
</svg>
